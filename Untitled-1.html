<!DOCTYPE html>
<html>
<head>
<title>ELJUR</title>
<style>
body {
    background:#0a0f1c;
    color:white;
    text-align:center;
}
input, button {
    padding:10px;
    margin:5px;
}
.card {
    background:#11182b;
    padding:15px;
    margin:10px;
}
</style>
</head>
<body>

<h1>⚡ ELJUR ANALYTICS ⚡</h1>

<input id="url" placeholder="URL">

<input id="login" placeholder="Login">

<input id="password" type="password">

<button onclick="load()">Запустить</button>

<div id="result"></div>

<script>
async function load() {
    const res = await fetch('/api/grades', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            url: url.value,
            login: login.value,
            password: password.value
        })
    });

    const data = await res.json();

    let html = "";

    for (let s in data) {
        html += `<div class="card">
            <h3>${s}</h3>
            <p>${data[s].grades}</p>
            <p>Средний: ${data[s].avg}</p>
        </div>`;
    }

    result.innerHTML = html;
}
</script>

</body>
</html>
